name: Update Wiki Chart

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      summary:
        description: 'Edit summary for manual trigger'
        required: false
        default: '半自动更新用户贡献 Echart 所用的 JSON 数据页面（手动触发）'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      WIKI_USER: "${{ secrets.WIKI_USER || vars.WIKI_USER }}"
      DISPLAY_NAME: "${{ secrets.DISPLAY_NAME || vars.DISPLAY_NAME }}"
      EXCLUDED_NAMESPACES: "${{ vars.EXCLUDED_NAMESPACES }}"
      NAMESPACE_MODE: "${{ vars.NAMESPACE_MODE }}"
      TOP_NAMESPACE_LIMIT: "${{ vars.TOP_NAMESPACE_LIMIT }}"
      CHART_SORT_MODE: "${{ vars.CHART_SORT_MODE }}"
      CHART_RENDER_MODE: "${{ vars.CHART_RENDER_MODE }}"
      CALENDAR_RANGE: "${{ vars.CALENDAR_RANGE }}"
      CHART_SERIES_TYPE: "${{ vars.CHART_SERIES_TYPE }}"
      CHART_MULTI_SERIES_MODE: "${{ vars.CHART_MULTI_SERIES_MODE }}"
      EXCLUDE_TAG: "${{ vars.EXCLUDE_TAG }}"
      ACCOUNT_REG_MARKER_MODE: "${{ vars.ACCOUNT_REG_MARKER_MODE }}"
      ACCOUNT_REG_MARKER_ENABLED: "${{ vars.ACCOUNT_REG_MARKER_ENABLED }}"
      ACCOUNT_REG_MARKER_OUT_OF_RANGE: "${{ vars.ACCOUNT_REG_MARKER_OUT_OF_RANGE }}"
      USER_AGENT: "${{ secrets.USER_AGENT || vars.USER_AGENT }}"
      EDIT_TAG_CANDIDATES: "${{ vars.EDIT_TAG_CANDIDATES || 'bot, Bot' }}"
      WIKI_API: "${{ vars.WIKI_API }}"
      WIKI_PAGE: "${{ secrets.WIKI_PAGE || vars.WIKI_PAGE }}"
      BOT_USERNAME: "${{ secrets.BOT_USERNAME }}"
      BOT_PASSWORD: "${{ secrets.BOT_PASSWORD }}"
      MW_API_HEADERS_JSON: "${{ secrets.MW_API_HEADERS_JSON || vars.MW_API_HEADERS_JSON }}"
      SUMMARY: "${{ github.event_name == 'workflow_dispatch' && github.event.inputs.summary || '自动更新用户贡献 Echart 所用的 JSON 数据页面' }}"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run generate_chart_json.py
        run: python generate_chart_json.py

      - name: Upload echart_option.json to wiki
        run: python publish_chart_json.py